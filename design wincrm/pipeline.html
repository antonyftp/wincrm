<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>WIN CRM — Pipeline</title>
<link rel="stylesheet" href="styles/system.css" />
</head>
<body>
  <div class="app" id="app"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="js/data.js"></script>
  <script type="text/babel" src="js/chrome.jsx"></script>
  <script type="text/babel">
    function App() {
      return (
        <>
          <Sidebar active="PIPELINE" />
          <main className="main">
            <Topbar
              title="Pipeline commercial"
              crumbs="Vue Kanban — glisser-déposer pour changer d'étape"
              actions={<>
                <select className="input btn-sm" style={{ width: 160, height: 36 }}>
                  <option>Tous commerciaux</option>
                  {WIN.AGENTS.map((a) => <option key={a.id}>{a.name}</option>)}
                </select>
                <button className="btn btn-sm"><Icon name="filter" size={14} /> Filtres</button>
                <button className="btn btn-primary btn-sm"><Icon name="plus" size={14} /> Nouveau lead</button>
              </>}
            />
            <div className="content" style={{ overflowX: "auto" }}>
              <div className="kanban">
                {WIN.STAGES.map((s) => {
                  const items = WIN.LEADS.filter((l) => l.stageId === s.id);
                  const sum = items.reduce((acc, l) => acc + l.budgetMax, 0);
                  return (
                    <div key={s.id} className="kcol">
                      <div className="kcol-h">
                        <div className="ttl">
                          <span className="colordot" style={{ background: s.color }}></span>
                          <span>{s.label}</span>
                          <span className="count">{items.length}</span>
                        </div>
                        <span className="sum tnum">{WIN.fmt.moneyShort(sum)}</span>
                      </div>
                      <div className="kcol-body">
                        {items.slice(0, 8).map((l) => (
                          <div key={l.id} className="kcard" onClick={() => location.href = `lead.html?id=${l.id}`}>
                            <div className="row between" style={{ alignItems: "center", marginBottom: 6 }}>
                              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                                <Avatar id={l.firstName[0] + l.lastName[0]} color={l.agent.color} size="avatar-sm" />
                                <div className="kc-name">{l.firstName} {l.lastName}</div>
                              </div>
                            </div>
                            <div className="kc-sub">{l.type} · {l.nature} · {l.city}</div>
                            <div className="kc-foot">
                              <span className="kc-budget">{WIN.fmt.moneyShort(l.budgetMax)}</span>
                              <span className="kc-meta"><Icon name="cal" size={12} /> {WIN.fmt.dateShort(l.nextAction)}</span>
                            </div>
                          </div>
                        ))}
                        {items.length > 8 && <button className="btn btn-sm btn-ghost" style={{ justifyContent: "center" }}>+ {items.length - 8} autres</button>}
                        {items.length === 0 && <div style={{ padding: 24, textAlign: "center", fontSize: 12, color: "var(--text-faint)" }}>Aucun lead</div>}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </main>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById("app")).render(<App />);
  </script>
</body>
</html>
